<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victim Logins</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:black;
    color:red;
    min-height:100vh;
    padding:30px;
}

h1{
    text-align:center;
    font-size:3rem;
    margin-bottom:30px;
    text-shadow:0 0 20px red;
}

.logins{
    width:100%;
    max-width:700px;
    margin:auto;
}

.card{
    background:#120000;
    border:1px solid red;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 0 18px rgba(255,0,0,0.4);
}

.line{
    margin:10px 0;
    font-size:1.1rem;
    word-break:break-word;
}

.empty{
    text-align:center;
    color:#888;
}
</style>
</head>

<body>

<h1>Victim Logins</h1>

<div class="logins" id="logins"></div>

<script>

let logins = JSON.parse(localStorage.getItem("demoLogins")) || [];

let container = document.getElementById("logins");

if(logins.length === 0){

    container.innerHTML = `
    <p class="empty">No demo entries stored.</p>
    `;

}else{

    logins.forEach(data => {

        container.innerHTML += `
        <div class="card">
            <div class="line">
                Username entered: ${data.username}
            </div>

            <div class="line">
                Passcode entered: ${data.password}
            </div>
        </div>
        `;
    });
}

</script>

</body>
</html>
